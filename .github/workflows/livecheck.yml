name: Livecheck & bump casks

on:
  schedule:
    - cron: '0 6,18 * * *' # daily at 06:00 and 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Tap self
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/graelo"
          ln -sfn "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/graelo/homebrew-tap"

      - name: Livecheck all casks
        id: livecheck
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          outdated=$(brew livecheck --cask --tap graelo/tap --json \
            | jq -r '.[] | select(.version.outdated == true) | "\(.cask)=\(.version.latest)"')
          {
            echo "outdated<<EOF"
            echo "$outdated"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -z "$outdated" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump outdated casks
        if: steps.livecheck.outputs.has_updates == 'true'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTDATED: ${{ steps.livecheck.outputs.outdated }}
        run: |
          while IFS='=' read -r cask version; do
            [ -z "$cask" ] && continue
            echo "Bumping $cask to $version"
            brew bump-cask-pr "graelo/tap/$cask" \
              --version "$version" \
              --no-audit \
              --no-browse \
              --no-style \
              --write-only
          done <<< "${OUTDATED}"

      - name: Create PR
        if: steps.livecheck.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          branch="livecheck/$(date +%Y%m%d)"
          git checkout -b "$branch"
          git add Casks/
          git commit -m "bump casks via livecheck"
          git push -u origin "$branch"
          gh pr create \
            --title "Bump casks ($(date +%Y-%m-%d))" \
            --body "Automated version bump from livecheck." \
            --base main
